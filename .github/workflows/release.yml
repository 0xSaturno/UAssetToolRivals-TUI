name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            binary_name: uassettool-tui.exe
            asset_name: uassettool-tui-windows-amd64.exe
            target_name: windows-amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: uassettool-tui
            asset_name: uassettool-tui-linux-amd64
            target_name: linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version metadata
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && -n "${GITHUB_REF_NAME}" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Build stripped binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w -X uassettool-tui/app.appVersion=${{ steps.version.outputs.version }}" -o '${{ matrix.binary_name }}' .

      - name: Rename release asset
        shell: bash
        run: |
          mv '${{ matrix.binary_name }}' '${{ matrix.asset_name }}'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target_name }}
          path: ${{ matrix.asset_name }}

  publish:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display artifact layout
        shell: bash
        run: |
          echo 'Downloaded release artifacts:'
          find dist -maxdepth 3 -type f -print

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows-amd64/uassettool-tui-windows-amd64.exe
            dist/linux-amd64/uassettool-tui-linux-amd64
          generate_release_notes: true
